<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Master Pack | NuPromptDev</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/inter-ui/inter.css">
    <style>
        :root {
            --bg: #0a0a0a;
            --card-bg: #141414;
            --text-main: #ffffff;
            --text-dim: #999999;
            --accent: #00ff88;
            --border: #222222;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in { opacity: 0; animation: fadeInUp 0.8s cubic-bezier(0.2, 0.6, 0.2, 1) forwards; }
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; }

        nav { display: flex; justify-content: space-between; align-items: center; padding: 40px 0; }
        .logo { font-weight: 700; letter-spacing: 2px; font-size: 1.1rem; text-transform: uppercase; }

        .hero { text-align: center; padding: 60px 0; }
        .badge { 
            display: inline-block;
            background: rgba(255,255,255,0.05); 
            color: var(--text-dim); 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            font-size: 0.7rem; 
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid var(--border);
            margin-bottom: 30px;
        }
        .hero h1 { font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 800; margin-bottom: 20px; letter-spacing: -2px; }
        
        .specs-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            margin: 40px auto;
            text-align: left;
            max-width: 500px;
        }

        .input-group { margin-bottom: 20px; }
        input[type="email"] {
            width: 100%;
            max-width: 350px;
            background: #000;
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 12px;
            color: #fff;
            font-family: inherit;
            margin-bottom: 10px;
            text-align: center;
        }

        .price-section { margin: 40px 0; }
        .price { font-size: 3.5rem; font-weight: 800; margin-bottom: 10px; }
        
        .btn-buy {
            display: inline-block;
            background: #fff;
            color: #000;
            padding: 20px 60px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            border: none;
        }
        .btn-buy:hover { background: var(--accent); }

        .tutorial { margin-top: 100px; padding: 60px 40px; border-top: 1px solid var(--border); background: rgba(255,255,255,0.02); border-radius: 30px; }
        footer { padding: 80px 0 40px; text-align: center; color: #444; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <nav class="fade-in">
        <div class="logo">NUPROMPTDEV.AI</div>
        <div class="badge">v1.0 Stable</div>
    </nav>

    <header class="hero fade-in delay-1">
        <span class="badge">Master Selection</span>
        <h1>AI Prompt Pack</h1>
        
        <div class="specs-card">
            <ul style="list-style: none; color: var(--text-dim);">
                <li style="margin-bottom: 10px;">→ 10 Photorealistic Prompts</li>
                <li style="margin-bottom: 10px;">→ Specialized in Engineering & Design</li>
                <li>→ Compatible with Midjourney / DALL-E</li>
            </ul>
        </div>

        <div class="price-section">
            <div class="input-group">
                <input type="email" id="userEmail" placeholder="Your email for delivery" required>
            </div>
            <div class="price">$1.99 <span style="font-size: 1rem; color: var(--text-dim);">USDC</span></div>
            <button onclick="createInvoice()" class="btn-buy">PURCHASE ACCESS</button>
        </div>
    </header>

    <footer class="fade-in delay-3">
        SECURE CHECKOUT BY NOWPAYMENTS • NuPromptDev 2026
    </footer>
</div>

<script>
async function createInvoice() {
    const email = document.getElementById('userEmail').value;
    if (!email || !email.includes('@')) {
        alert('Please enter a valid email to receive the pack.');
        return;
    }

    const API_KEY = '2C9CSPB-5R3MW6Z-PEC0ZC2-2KMD7BK'; // Reemplaza esto
    const IPN_URL = 'https://hook.us2.make.com/bbe0jg7noby3iv2pajrlelc2bf94ud42'; // Reemplaza esto

    try {
        const response = await fetch('https://api.nowpayments.io/v1/invoice', {
            method: 'POST',
            headers: {
                'x-api-key': API_KEY,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                price_amount: 1.99,
                price_currency: 'usd',
                pay_currency: 'usdcsol',
                ipn_callback_url: IPN_URL,
                order_description: 'AI Prompt Pack - NuPromptDev',
                customer_email: email,
                success_url: 'https://argenticityzenx.github.io/portfolio' // Cambia esto
            })
        });

        const data = await response.json();
        if (data.invoice_url) {
            window.location.href = data.invoice_url;
        } else {
            alert('Error creating invoice. Check API Key.');
        }
    } catch (e) {
        console.error(e);
        alert('Service unavailable.');
    }
}
</script>

</body>
</html>
